services:
  my-melody-chat:
    build: .
    ports:
      - "3030:3000"
      - "3031:3443"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MEM0_API_KEY=${MEM0_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - GIPHY_API_KEY=${GIPHY_API_KEY}
    volumes:
      - melody-data:/app/data
    restart: unless-stopped

volumes:
  melody-data:
