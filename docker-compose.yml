services:
  my-melody-chat:
    build: .
    ports:
      - "3030:3000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MEM0_API_KEY=${MEM0_API_KEY}
      - MEM0_MODE=${MEM0_MODE}
      - MEM0_SELF_URL=${MEM0_SELF_URL}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - GIPHY_API_KEY=${GIPHY_API_KEY}
      - DEFAULT_LAT=${DEFAULT_LAT}
      - DEFAULT_LON=${DEFAULT_LON}
      - NWS_RADAR_STATION=${NWS_RADAR_STATION}
      - NWS_OFFICE=${NWS_OFFICE}
      - DEFAULT_USER_EMAIL=${DEFAULT_USER_EMAIL:-owner@local}       # Fallback identity when Cloudflare Access header is absent (LAN access)
      - MIGRATION_EMAIL_AMELIA=${MIGRATION_EMAIL_AMELIA:-}         # Email to migrate Amelia's legacy data to (one-time, leave empty to skip)
      - MIGRATION_EMAIL_LONNIE=${MIGRATION_EMAIL_LONNIE:-}         # Email to migrate Lonnie's legacy data to (one-time, leave empty to skip)
    volumes:
      - melody-data:/app/data
    depends_on:
      - mem0-server
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  mem0-server:
    build: ./mem0-server
    ports:
      - "8769:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - COLLECTION_NAME=mymelo
      - LLM_MODEL=gemini-2.5-flash-lite
      - EMBED_MODEL=gemini-embedding-001
      - EMBED_DIMS=768
      - KNOWN_USER_IDS=${KNOWN_USER_IDS:-melody-friend-amelia,melody-friend-lonnie}
      - KNOWN_AGENT_IDS=${KNOWN_AGENT_IDS:-my-melody,kuromi,retsuko}
      - RERANK_ENABLED=${RERANK_ENABLED:-true}
      - RERANK_OLLAMA_URL=${RERANK_OLLAMA_URL:-http://192.168.1.95:11434}
      - RERANK_MODEL=${RERANK_MODEL:-llama3.2}
      - RERANK_FETCH_MULTIPLIER=${RERANK_FETCH_MULTIPLIER:-3}
      - LOG_LEVEL=INFO
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  melody-data:
    external: true
    name: hellokittyfriends_melody-data
  qdrant_storage:
    external: true
    name: mymelo-mem0_qdrant_storage
