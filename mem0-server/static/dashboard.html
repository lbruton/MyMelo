<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyMelo Memory Dashboard</title>
<style>
  :root {
    --bg: #0f0f17;
    --surface: #1a1a2e;
    --surface-hover: #222240;
    --border: #2a2a4a;
    --text: #e4e4f0;
    --text-muted: #8888aa;
    --accent: #e888b0;
    --accent-dim: #c06090;
    --danger: #e85555;
    --tag-user: #6ec6ff;
    --tag-agent: #ffb86c;
    --tag-score: #50fa7b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px; }

  /* Stats bar */
  .stats {
    display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; min-width: 120px; flex: 1;
  }
  .stat-card .value { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
  .stat-card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

  /* Controls */
  .controls {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .controls input, .controls select {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 0.9rem;
  }
  .controls input { flex: 1; min-width: 200px; }
  .controls input:focus, .controls select:focus { outline: none; border-color: var(--accent); }
  .controls select { min-width: 140px; }
  .btn {
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 0.85rem; font-weight: 500; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-dim); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 0.78rem; }

  /* Memory list */
  .memory-list { display: flex; flex-direction: column; gap: 8px; }
  .memory-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; transition: border-color 0.15s;
  }
  .memory-card:hover { border-color: var(--accent); }
  .memory-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; gap: 8px; flex-wrap: wrap;
  }
  .memory-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 0.7rem; padding: 2px 8px; border-radius: 12px;
    font-weight: 500; letter-spacing: 0.3px;
  }
  .tag-user { background: rgba(110,198,255,0.15); color: var(--tag-user); }
  .tag-agent { background: rgba(255,184,108,0.15); color: var(--tag-agent); }
  .tag-score { background: rgba(80,250,123,0.1); color: var(--tag-score); }
  .memory-text { font-size: 0.9rem; line-height: 1.5; margin-bottom: 8px; }
  .memory-meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.75rem; color: var(--text-muted);
  }
  .memory-id { font-family: monospace; font-size: 0.7rem; opacity: 0.5; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--text-muted); }
  .empty { text-align: center; padding: 40px; color: var(--text-muted); font-style: italic; }

  /* Status bar */
  .status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 6px 16px; font-size: 0.75rem; color: var(--text-muted);
    display: flex; justify-content: space-between;
  }

  /* Confirm dialog */
  .confirm-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 100; align-items: center; justify-content: center;
  }
  .confirm-overlay.active { display: flex; }
  .confirm-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; max-width: 400px; text-align: center;
  }
  .confirm-box p { margin-bottom: 16px; }
  .confirm-actions { display: flex; gap: 8px; justify-content: center; }
</style>
</head>
<body>
<div class="container">
  <h1>MyMelo Memory Dashboard</h1>
  <p class="subtitle" id="serverInfo">Connecting...</p>

  <div class="stats" id="stats"></div>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search memories..." />
    <select id="scopeFilter">
      <option value="">All Scopes</option>
    </select>
    <button class="btn btn-primary" onclick="doSearch()">Search</button>
    <button class="btn btn-danger btn-sm" onclick="clearSearch()">Clear</button>
  </div>

  <div class="memory-list" id="memoryList">
    <div class="loading">Loading memories...</div>
  </div>
</div>

<div class="status-bar">
  <span id="statusLeft">Ready</span>
  <span id="statusRight"></span>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmText">Delete this memory?</p>
    <div class="confirm-actions">
      <button class="btn btn-danger" id="confirmYes">Delete</button>
      <button class="btn btn-primary" onclick="hideConfirm()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let allMemories = [];
let knownScopes = new Set();

async function fetchHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    document.getElementById('serverInfo').textContent =
      `${d.collection} | LLM: ${d.llm_model} | Embedder: ${d.embed_model} | Qdrant: ${d.qdrant}`;
  } catch {
    document.getElementById('serverInfo').textContent = 'Server unreachable';
  }
}

async function fetchStats() {
  try {
    const r = await fetch(`${API}/api/stats`);
    const d = await r.json();
    const statsEl = document.getElementById('stats');
    let html = `<div class="stat-card"><div class="value">${d.total_memories}</div><div class="label">Total Memories</div></div>`;
    const tracks = Object.entries(d.tracks || {}).sort((a, b) => b[1] - a[1]);
    for (const [name, count] of tracks.slice(0, 5)) {
      html += `<div class="stat-card"><div class="value">${count}</div><div class="label">${name}</div></div>`;
    }
    statsEl.innerHTML = html;
  } catch { /* ignore */ }
}

async function fetchMemories(search, scope) {
  const list = document.getElementById('memoryList');
  list.innerHTML = '<div class="loading">Loading...</div>';

  let url = `${API}/api/memories/all`;
  const params = new URLSearchParams();
  if (search) params.set('search', search);
  if (scope) {
    // Determine if scope is a user_id or agent_id based on known patterns
    if (scope.startsWith('my-') || scope === 'kuromi' || scope === 'retsuko') {
      params.set('agent_id', scope);
    } else {
      params.set('user_id', scope);
    }
  }
  if (params.toString()) url += '?' + params.toString();

  try {
    const r = await fetch(url);
    const d = await r.json();
    allMemories = d.memories || [];
    renderMemories(allMemories);
    updateScopes(allMemories);
    document.getElementById('statusLeft').textContent = `${allMemories.length} memories loaded`;
  } catch (e) {
    list.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

function updateScopes(memories) {
  for (const m of memories) {
    if (m.user_id) knownScopes.add(m.user_id);
    if (m.agent_id) knownScopes.add(m.agent_id);
  }
  const select = document.getElementById('scopeFilter');
  const current = select.value;
  select.innerHTML = '<option value="">All Scopes</option>';
  for (const s of [...knownScopes].sort()) {
    select.innerHTML += `<option value="${s}" ${s === current ? 'selected' : ''}>${s}</option>`;
  }
}

function renderMemories(memories) {
  const list = document.getElementById('memoryList');
  if (!memories.length) {
    list.innerHTML = '<div class="empty">No memories found</div>';
    return;
  }
  list.innerHTML = memories.map(m => {
    const uid = m.user_id || '';
    const aid = m.agent_id || '';
    const score = m.score != null ? `<span class="tag tag-score">${(m.score * 100).toFixed(0)}%</span>` : '';
    const date = m.updated_at || m.created_at || '';
    const dateStr = date ? new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
    const meta = m.metadata || {};
    const metaStr = Object.entries(meta).filter(([k]) => !['hash'].includes(k)).map(([k, v]) => `${k}: ${v}`).join(' | ');

    return `<div class="memory-card">
      <div class="memory-header">
        <div class="memory-tags">
          ${uid ? `<span class="tag tag-user">${uid}</span>` : ''}
          ${aid ? `<span class="tag tag-agent">${aid}</span>` : ''}
          ${score}
        </div>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete('${m.id}')">Delete</button>
      </div>
      <div class="memory-text">${escapeHtml(m.memory || '')}</div>
      <div class="memory-meta">
        <span>${dateStr}${metaStr ? ' | ' + metaStr : ''}</span>
        <span class="memory-id">${(m.id || '').substring(0, 8)}</span>
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function doSearch() {
  const search = document.getElementById('searchInput').value.trim();
  const scope = document.getElementById('scopeFilter').value;
  fetchMemories(search || null, scope || null);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('scopeFilter').value = '';
  fetchMemories();
}

let pendingDeleteId = null;
function confirmDelete(id) {
  pendingDeleteId = id;
  const mem = allMemories.find(m => m.id === id);
  document.getElementById('confirmText').textContent =
    `Delete memory: "${(mem?.memory || '').substring(0, 80)}..."?`;
  document.getElementById('confirmOverlay').classList.add('active');
}

function hideConfirm() {
  document.getElementById('confirmOverlay').classList.remove('active');
  pendingDeleteId = null;
}

document.getElementById('confirmYes').onclick = async () => {
  if (!pendingDeleteId) return;
  try {
    await fetch(`${API}/api/memories/${pendingDeleteId}`, { method: 'DELETE' });
    allMemories = allMemories.filter(m => m.id !== pendingDeleteId);
    renderMemories(allMemories);
    fetchStats();
    document.getElementById('statusLeft').textContent = 'Memory deleted';
  } catch (e) {
    document.getElementById('statusLeft').textContent = `Delete failed: ${e.message}`;
  }
  hideConfirm();
};

// Enter key triggers search
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// Scope filter change triggers reload
document.getElementById('scopeFilter').addEventListener('change', doSearch);

// Init
fetchHealth();
fetchStats();
fetchMemories();
</script>
</body>
</html>
