services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  mem0-server:
    build: .
    ports:
      - "8769:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - COLLECTION_NAME=mymelo
      - LLM_MODEL=gemini-2.5-flash-lite
      - EMBED_MODEL=gemini-embedding-001
      - EMBED_DIMS=768
      - KNOWN_USER_IDS=${KNOWN_USER_IDS:-melody-friend-amelia,melody-friend-lonnie}
      - KNOWN_AGENT_IDS=${KNOWN_AGENT_IDS:-my-melody,kuromi,retsuko}
      - RERANK_ENABLED=${RERANK_ENABLED:-true}
      - RERANK_OLLAMA_URL=${RERANK_OLLAMA_URL:-http://192.168.1.95:11434}
      - RERANK_MODEL=${RERANK_MODEL:-llama3.2}
      - RERANK_FETCH_MULTIPLIER=${RERANK_FETCH_MULTIPLIER:-3}
      - LOG_LEVEL=INFO
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_storage:
