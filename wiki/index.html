<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Melody Chat Wiki</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #FF69B4;
      --sidebar-width: 260px;
      --sidebar-background: #FFF0F5;
      --sidebar-nav-link-color--active: #FF69B4;
      --sidebar-name-color: #FF69B4;
      --sidebar-name-font-weight: 700;
      --link-color: #FF69B4;
      --link-color--hover: #FF85C2;
      --blockquote-border-color: #FFB6C1;
      --code-theme-background: #FFF5F8;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'My Melody Chat Wiki',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: 'Search wiki...',
        noData: 'No results.',
        paths: 'auto'
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
