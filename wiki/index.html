<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Melody Chat Wiki</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css" />
    <style>
      :root {
        --base-font-size: 15px;
        --theme-color: #ff69b4;
        --sidebar-width: 260px;
        --sidebar-background: #fff0f5;
        --sidebar-nav-link-color--active: #ff69b4;
        --sidebar-name-color: #ff69b4;
        --sidebar-name-font-weight: 700;
        --link-color: #ff69b4;
        --link-color--hover: #ff85c2;
        --blockquote-border-color: #ffb6c1;
        --code-theme-background: #fff5f8;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: 'My Melody Chat Wiki',
        repo: '',
        loadSidebar: true,
        subMaxLevel: 2,
        auto2top: true,
        search: {
          placeholder: 'Search wiki...',
          noData: 'No results.',
          paths: 'auto',
        },
        pagination: {
          previousText: 'Previous',
          nextText: 'Next',
          crossChapter: true,
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  </body>
</html>
